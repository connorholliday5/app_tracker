services:
  grad-app-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grad-app-tracker
    ports:
      - "8501:8501"
    volumes:
      - app_data:/app/data
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
    restart: unless-stopped

volumes:
  app_data:
